<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Circle Avatar</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="editor-panel">
        <div class="topbar">
          <div>
            <h1>Circle Avatar</h1>
            <p>Carrega uma fotografia, ajusta o corte e exporta um PNG circular com fundo transparente.</p>
          </div>
          <label class="upload-button">
            <input id="photoInput" type="file" accept="image/*">
            Escolher foto
          </label>
        </div>

        <div class="workspace">
          <div class="canvas-wrap">
            <canvas id="avatarCanvas" width="720" height="720" aria-label="Editor de avatar circular"></canvas>
          </div>

          <aside class="controls">
            <div class="control-group">
              <span class="label">Modo</span>
              <div class="segmented" role="group" aria-label="Modo de edição">
                <button id="moveMode" class="active" type="button">Mover foto</button>
                <button id="cropMode" type="button">Corte retangular</button>
              </div>
            </div>

            <div class="control-group">
              <label for="zoomRange" class="label">Zoom</label>
              <input id="zoomRange" type="range" min="0.2" max="4" step="0.01" value="1">
            </div>

            <div class="control-group">
              <span class="label">Ajuste quadridirecional</span>
              <div class="nudge-grid">
                <span></span>
                <button type="button" data-nudge="up" title="Mover para cima">↑</button>
                <span></span>
                <button type="button" data-nudge="left" title="Mover para a esquerda">←</button>
                <button type="button" id="centerImage" title="Centrar foto">•</button>
                <button type="button" data-nudge="right" title="Mover para a direita">→</button>
                <span></span>
                <button type="button" data-nudge="down" title="Mover para baixo">↓</button>
                <span></span>
              </div>
            </div>

            <div class="control-group">
              <span class="label">Tamanho final</span>
              <select id="exportSize">
                <option value="512">512 × 512 px</option>
                <option value="1024" selected>1024 × 1024 px</option>
                <option value="2048">2048 × 2048 px</option>
              </select>
            </div>

            <div class="actions">
              <button id="resetEditor" class="secondary" type="button">Repor</button>
              <button id="downloadPng" class="primary" type="button" disabled>Exportar PNG</button>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
